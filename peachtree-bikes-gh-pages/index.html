      const ridingType = answers['riding-type'] || 'MTB';
      const accessoryType = ridingType.toLowerCase() === 'road' ? 'road' : 'mtb';

      const matchCount = useMemo(() => {
        const answered = Object.keys(answers).filter(k => answers[k] && answers[k] !== 'Skip').length;
        return Math.max(2, 8 - answered);

        const type = answers['riding-type'];
        return Object.values(bikes).filter(b => (!type || b.category === type));
      }, [demoMode, answers]);

      const getAccessoriesForType = (category) => accessories[category]?.[accessoryType] || [];

      const handleAnswerSelect = (questionId, option) => {

                    <div className={`w-5 h-5 rounded-full flex items-center justify-center ${step.status === 'in-progress' ? 'bg-blue-500' : step.status === 'complete' ? 'bg-green-500' : 'bg-gray-200'}`}>
                      {step.status === 'in-progress' && <Icon name="circle" size={8} className="text-white" />}
                      {step.status === 'complete' && <Icon name="check" size={12} className="text-white" />}
                    </div>
                    <span className="text-sm flex-1 text-left">{step.label}</span>
                    <Badge variant={step.status === 'in-progress' ? 'primary' : step.status === 'complete' ? 'success' : 'default'} size="sm">
                      {step.status === 'in-progress' ? 'In progress' : step.status === 'complete' ? 'Done' : 'Todo'}
                    </Badge>
                  </button>
                ))}
              </div>
            </Card>

            {/* Customer Activity */}
            <Card className="p-4">
              <div className="flex items-center justify-between mb-3">
                <h4 className="font-medium">Customer Activity</h4>
                <Icon name="activity" size={16} className="text-gray-400" />
              </div>
              <div className="space-y-3">
                {customerActivity.map((item, idx) => (
                  <div key={idx} className="flex items-center justify-between">
                    <div>
                      <p className="text-sm">{item.action}</p>
                      <p className="text-xs text-gray-400">{item.time}</p>
                    </div>
                    <Badge size="sm">Customer</Badge>
                  </div>
                ))}
              </div>
            </Card>
          </aside>

          {/* Main content */}
          <main className="flex-1 p-6 bg-gray-50 overflow-y-auto">
            <Card className="p-0">
              <Tabs tabs={tabs} activeTab={activeTab} onChange={setActiveTab} />
              <div className="p-6">{renderTabContent()}</div>
            </Card>
          </main>
        </div>
      );
    };

    // ============ MAIN APP ============
    function App() {
      const [currentPage, setCurrentPage] = useState('pipeline'); // pipeline, deal, leaderboard, omnichannel, workflows, attribution, price-watch
      const [demoMode, setDemoMode] = useState('mtb');
      const [answers, setAnswers] = useState({});
      const [selectedBike, setSelectedBike] = useState(null);
      const [selectedAccessories, setSelectedAccessories] = useState([]);
      const [leaderboardPeriod, setLeaderboardPeriod] = useState('monthly');

      useEffect(() => {
        if (demoMode && demoScenarios[demoMode]) {
          setAnswers(demoScenarios[demoMode].answers);
          setSelectedBike(null);
          setSelectedAccessories([]);
        } else {
          setAnswers({});
          setSelectedBike(null);
          setSelectedAccessories([]);
        }
      }, [demoMode]);

      // Determine view mode from current page
      const viewMode = currentPage === 'deal' ? 'in-store' : currentPage === 'price-watch' ? 'customer' : 'admin';

      const footerNav = [
        { id: 'pipeline', label: 'Pipeline', icon: 'layers' },
        { id: 'deal', label: 'Deal', icon: 'bike' },
        { id: 'leaderboard', label: 'Leaderboard', icon: 'trophy' },
        { id: 'omnichannel', label: 'Omni-channel', icon: 'globe' },
        { id: 'workflows', label: 'Workflows', icon: 'zap' },
        { id: 'attribution', label: 'Attribution', icon: 'pieChart' },
        { id: 'price-watch', label: 'Price Watch', icon: 'tag' },
      ];

      const renderPage = () => {
        switch (currentPage) {
          case 'pipeline':
            return (
              <div className="flex-1 p-6 bg-gray-50 overflow-y-auto">
                <div className="max-w-7xl mx-auto">
                  <SalesPipeline onNavigate={setCurrentPage} />
                </div>
              </div>
            );
          case 'leaderboard':
            return (
              <div className="flex-1 p-6 bg-gray-50 overflow-y-auto">
                <div className="max-w-7xl mx-auto">
                  <Leaderboard period={leaderboardPeriod} onPeriodChange={setLeaderboardPeriod} />
                </div>
              </div>
            );
          case 'omnichannel':
            return (
              <div className="flex-1 p-6 bg-gray-50 overflow-y-auto">
                <div className="max-w-7xl mx-auto">
                  <OmnichannelPage />
                </div>
              </div>
            );
          case 'workflows':
            return (
              <div className="flex-1 p-6 bg-gray-50 overflow-y-auto">
                <div className="max-w-7xl mx-auto">
                  <WorkflowsPage />
                </div>
              </div>
            );
          case 'attribution':
            return (
              <div className="flex-1 p-6 bg-gray-50 overflow-y-auto">
                <div className="max-w-7xl mx-auto">
                  <AttributionPage />
                </div>
              </div>
            );
          case 'price-watch':
            return (
              <div className="flex-1 p-6 bg-gray-50 overflow-y-auto">
                <div className="max-w-4xl mx-auto">
                  <PriceWatch />
                </div>
              </div>
            );
          case 'deal':
          default:
            return (
              <DealWorkspace
                demoMode={demoMode}
                answers={answers}
                setAnswers={setAnswers}
                selectedBike={selectedBike}
                setSelectedBike={setSelectedBike}
                selectedAccessories={selectedAccessories}
                setSelectedAccessories={setSelectedAccessories}
              />
            );
        }
      };

      return (
        <div className="min-h-screen flex flex-col bg-gray-100">
          <Header viewMode={viewMode} />
          {currentPage === 'deal' && (
            <ProgressBar progress={selectedBike ? 75 : Object.keys(answers).length * 12} className="mx-0" />
          )}
          {renderPage()}

          {/* Footer Navigation */}
          <div className="bg-gray-800 text-white flex-shrink-0">
            {/* Demo selector row - only for deal view */}
            {currentPage === 'deal' && (
              <div className="border-b border-gray-700 px-4 py-1.5">
                <div className="flex items-center justify-center gap-4 max-w-7xl mx-auto">
                  <div className="flex items-center gap-2 text-gray-400 text-sm">
                    <Icon name="play" size={14} />
                    <span>Demo</span>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => setDemoMode('mtb')} className={`px-3 py-1 rounded text-xs font-medium transition-colors ${demoMode === 'mtb' ? 'bg-green-500 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>MTB</button>
                    <button onClick={() => setDemoMode('road')} className={`px-3 py-1 rounded text-xs font-medium transition-colors ${demoMode === 'road' ? 'bg-blue-500 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>Road</button>
                    <button onClick={() => setDemoMode(null)} className={`px-3 py-1 rounded text-xs font-medium transition-colors ${!demoMode ? 'bg-gray-500 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>Manual</button>
                  </div>
                  {demoMode && <div className="text-xs text-gray-400">Pre-loaded: {demoScenarios[demoMode].name}</div>}
                </div>
              </div>
            )}

            {/* Main footer nav */}
            <div className="px-4 py-2">
              <div className="flex items-center justify-center gap-1 max-w-7xl mx-auto">
                {footerNav.map(item => (
                  <button
                    key={item.id}
                    onClick={() => setCurrentPage(item.id)}
                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-medium transition-all ${
                      currentPage === item.id
                        ? 'bg-white text-gray-900 shadow-sm'
                        : 'text-gray-400 hover:text-white hover:bg-gray-700'
                    }`}
                  >
                    <Icon name={item.icon} size={14} />
                    {item.label}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
